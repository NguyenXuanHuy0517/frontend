name: phongtro40
description: Phòng Trọ 4.0 - Smart Room Rental Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  # Fonts
  google_fonts: ^6.1.0
  # Icons
  lucide_icons: any
  # Navigation
  go_router: ^12.0.0
  # State management
  flutter_riverpod: ^2.4.0
